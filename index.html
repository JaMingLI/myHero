<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-32.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alen Dev</title>
    <!-- Anti-flicker script: Apply theme before render -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme-mode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var effectiveTheme = theme === 'light' ? 'light' : theme === 'dark' ? 'dark' : (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.add(effectiveTheme);
        document.documentElement.setAttribute('data-theme', effectiveTheme);
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
